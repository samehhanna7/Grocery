<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My Grocery List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #F5820A;
      --orange-light: #FEF3E7;
      --yellow: #F5C518;
      --yellow-light: #FEFAE8;
      --blue: #3B82F6;
      --blue-light: #EFF6FF;
      --bg: #FFFFFF;
      --surface: #F9F9F9;
      --text: #1A1A1A;
      --text-muted: #888;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 90px;
      -webkit-overflow-scrolling: touch;
    }

    /* HEADER */
    .header {
      padding: 24px 20px 12px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .header-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .header-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* STORE SWITCHER BUTTON */
    .store-btn-wrap { position: relative; }
    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--orange-light);
      color: var(--orange);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 99px;
      border: none;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .store-chevron { font-size: 10px; }

    /* STORE DROPDOWN */
    .store-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--bg);
      border: 1.5px solid #F0F0F0;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 180px;
      z-index: 50;
      overflow: hidden;
    }
    .store-dropdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .store-dropdown-item:hover { background: var(--surface); }
    .store-dropdown-item.active { color: var(--orange); }
    .store-dropdown-item .store-day {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      margin-left: auto;
    }
    .store-dropdown-divider { height: 1px; background: #F0F0F0; }
    .store-dropdown-add {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .store-dropdown-add:hover { background: var(--blue-light); }

    /* ADD ITEM BAR */
    .add-bar {
      display: flex;
      gap: 8px;
      padding: 0 20px 8px;
    }
    .add-input {
      flex: 1;
      border: 2px solid #F0F0F0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s;
    }
    .add-input:focus { border-color: var(--orange); }
    .add-btn {
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .add-btn:active { transform: scale(0.94); }

    /* FREQUENCY PICKER (add bar) */
    .freq-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 20px 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .freq-row::-webkit-scrollbar { display: none; }
    .freq-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      flex-shrink: 0;
    }
    .freq-pill {
      font-size: 12px;
      font-weight: 600;
      padding: 15px 12px;
      border-radius: 99px;
      border: 2px solid #F0F0F0;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .freq-pill.selected {
      background: var(--orange);
      border-color: var(--orange);
      color: white;
    }

    /* FREQUENCY CHANGE PILLS (schedule cards) */
    .freq-change-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .freq-change-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 16px 10px;
      border-radius: 99px;
      border: 1.5px solid #E8E8E8;
      background: white;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .freq-change-pill:active { transform: scale(0.95); }
    .freq-change-pill.current {
      background: var(--orange-light);
      border-color: var(--orange);
      color: var(--orange);
    }
    .freq-change-pill.remove {
      border-color: #FECACA;
      color: #EF4444;
    }
    .freq-change-pill.remove:hover { background: #FEF2F2; }

    /* PROGRESS BAR */
    .progress-wrap { padding: 0 20px 20px; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 8px;
      background: #F0F0F0;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--orange), var(--yellow));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* SECTION */
    .section { padding: 0 20px 8px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .section-icon { font-size: 18px; }
    .section-name {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    .section-count {
      font-size: 11px;
      background: #F0F0F0;
      color: var(--text-muted);
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 600;
    }

    /* ITEM CARD */
    .item-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      border: 2px solid #F0F0F0;
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, opacity 0.2s;
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .item-card:active { transform: scale(0.98); }
    .item-card.checked {
      background: #FAFAFA;
      border-color: #E8E8E8;
      opacity: 0.7;
    }
    .item-check {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2.5px solid #DDD;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .item-card.checked .item-check {
      background: var(--orange);
      border-color: var(--orange);
      color: white;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-size: 15px;
      font-weight: 600;
      transition: text-decoration 0.2s;
    }
    .item-card.checked .item-name {
      text-decoration: line-through;
      color: var(--text-muted);
    }
    .item-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .item-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 99px;
      flex-shrink: 0;
    }
    .badge-recurring { background: var(--orange-light); color: var(--orange); }
    .badge-wife { background: var(--blue-light); color: var(--blue); }
    .badge-shared { background: var(--yellow-light); color: #B8940A; }
    .item-delete {
      background: none;
      border: none;
      color: #CCC;
      font-size: 16px;
      cursor: pointer;
      padding: 13px 4px;
      border-radius: 8px;
      flex-shrink: 0;
      transition: color 0.2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .item-delete:hover { color: #FF4444; }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--bg);
      border-top: 1px solid #F0F0F0;
      display: flex;
      padding: 10px 0 calc(16px + env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      padding: 6px 4px;
      border-radius: 12px;
      transition: background 0.2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item:active { background: var(--surface); }
    .nav-icon { font-size: 22px; }
    .nav-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .nav-item.active .nav-label { color: var(--orange); }
    .nav-item.active .nav-icon { filter: none; }

    /* PAGE */
    .page { display: none; }
    .page.active { display: block; }

    /* SCHEDULE PAGE */
    .schedule-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      margin: 0 20px 12px;
    }
    .schedule-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .schedule-item-name { font-size: 15px; font-weight: 700; }
    .schedule-freq {
      font-size: 12px;
      color: var(--orange);
      font-weight: 600;
      background: var(--orange-light);
      padding: 3px 9px;
      border-radius: 99px;
    }
    .schedule-next { font-size: 12px; color: var(--text-muted); }
    .page-title { font-size: 22px; font-weight: 800; padding: 24px 20px 16px; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 48px 32px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1A1A1A;
      color: white;
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      z-index: 200;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* DIVIDER */
    .divider { height: 12px; }

    /* SCHEDULE ADD BUTTON */
    .schedule-add-btn {
      width: 100%;
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .schedule-add-btn:active { opacity: 0.85; }

    /* SELECT styled as modal-input */
    select.modal-input { appearance: none; -webkit-appearance: none; }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      padding: 24px;
    }
    .modal-box {
      background: var(--bg);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 360px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 20px;
    }
    .modal-field { margin-bottom: 16px; }
    .modal-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 6px;
    }
    .modal-input {
      width: 100%;
      border: 2px solid #F0F0F0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--orange); }
    .modal-input.error { border-color: #EF4444; }
    .modal-error {
      font-size: 12px;
      color: #EF4444;
      margin-top: 5px;
      min-height: 16px;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .modal-btn-cancel {
      flex: 1;
      background: var(--surface);
      color: var(--text-muted);
      border: 2px solid #F0F0F0;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .modal-btn-create {
      flex: 1;
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

<!-- PAGES -->
<div id="page-list" class="page active">
  <div class="header">
    <div class="header-top">
      <div class="header-title">My Groceries</div>
      <div class="store-btn-wrap">
        <button class="store-btn" id="store-btn" onclick="toggleStoreDropdown(event)">
          <span id="store-btn-label">🛒 Sobeys</span>
          <span class="store-chevron">▾</span>
        </button>
        <div class="store-dropdown" id="store-dropdown" style="display:none;"></div>
      </div>
    </div>
    <div class="header-subtitle" id="header-subtitle">Loading your list...</div>
  </div>

  <div class="add-bar">
    <input class="add-input" id="add-input" type="text" placeholder="Add an item…" autocomplete="off" />
    <button class="add-btn" onclick="addItem()">+</button>
  </div>
  <div class="freq-row">
    <span class="freq-label">Schedule:</span>
    <span class="freq-pill" data-days="1" onclick="selectFreq(this)">Daily</span>
    <span class="freq-pill" data-days="3" onclick="selectFreq(this)">Every 3 Days</span>
    <span class="freq-pill selected" data-days="7" onclick="selectFreq(this)">Weekly</span>
    <span class="freq-pill" data-days="14" onclick="selectFreq(this)">Biweekly</span>
    <span class="freq-pill" data-days="30" onclick="selectFreq(this)">Monthly</span>
    <span class="freq-pill" data-days="0" onclick="selectFreq(this)">As Needed</span>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">0 of 0 items checked</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div id="list-container"></div>
</div>

<div id="page-history" class="page">
  <div class="page-title">Item History</div>
  <div id="history-container"></div>
</div>

<div id="page-schedule" class="page">
  <div class="page-title">Auto-Schedule</div>
  <div style="padding: 0 20px 16px;">
    <button class="schedule-add-btn" onclick="openAddScheduleModal()">＋ Add Scheduled Item</button>
  </div>
  <div id="schedule-container"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" id="nav-list" onclick="showPage('list')">
    <div class="nav-icon">🛒</div>
    <div class="nav-label">List</div>
  </div>
  <div class="nav-item" id="nav-history" onclick="showPage('history')">
    <div class="nav-icon">📋</div>
    <div class="nav-label">History</div>
  </div>
  <div class="nav-item" id="nav-schedule" onclick="showPage('schedule')">
    <div class="nav-icon">🔁</div>
    <div class="nav-label">Schedule</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ADD STORE MODAL -->
<div class="modal-overlay" id="store-modal" style="display:none;" onclick="handleModalOverlayClick(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">Add New Store</div>
    <div class="modal-field">
      <label class="modal-label">Store name</label>
      <input class="modal-input" id="modal-store-name" type="text" placeholder="e.g. Whole Foods" autocomplete="off" />
      <div class="modal-error" id="modal-name-error"></div>
    </div>
    <div class="modal-field">
      <label class="modal-label">Shopping day (optional)</label>
      <input class="modal-input" id="modal-shopping-day" type="text" placeholder="e.g. Sunday" autocomplete="off" />
    </div>
    <div class="modal-actions">
      <button class="modal-btn-cancel" onclick="closeStoreModal()">Cancel</button>
      <button class="modal-btn-create" onclick="createStore()">Create Store</button>
    </div>
  </div>
</div>

<!-- ADD SCHEDULE MODAL -->
<div class="modal-overlay" id="schedule-modal" style="display:none;" onclick="handleScheduleModalOverlayClick(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">Add Scheduled Item</div>
    <div class="modal-field">
      <label class="modal-label">Item name</label>
      <input class="modal-input" id="sched-modal-name" type="text" placeholder="e.g. Olive Oil" autocomplete="off" />
      <div class="modal-error" id="sched-modal-error"></div>
    </div>
    <div class="modal-field">
      <label class="modal-label">Frequency</label>
      <select class="modal-input" id="sched-modal-freq" onchange="updateFirstAppearance()">
        <option value="7">Weekly</option>
        <option value="14">Biweekly</option>
        <option value="21">Every 3 weeks</option>
        <option value="30">Monthly</option>
      </select>
    </div>
    <div class="modal-field">
      <div class="modal-label">First appearance</div>
      <div id="sched-modal-date" style="font-size:13px;color:var(--text-muted);padding:4px 0;"></div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn-cancel" onclick="closeAddScheduleModal()">Cancel</button>
      <button class="modal-btn-create" onclick="createScheduledItem()">Add to Schedule</button>
    </div>
  </div>
</div>

<script>
// ─── CONSTANTS ─────────────────────────────────────────────────────────────────

const CATEGORIES = {
  'Produce':        { icon: '🥦', color: '#22C55E', items: ['carrots','apples','bananas','avocados','blueberries','raspberries'] },
  'Dairy & Milk':   { icon: '🥛', color: '#3B82F6', items: ['protein milk','regular milk','milk'] },
  'Yogurt':         { icon: '🫙', color: '#A78BFA', items: ['protein yogurt','coconut yogurt','yogurt'] },
  'Meat & Seafood': { icon: '🍗', color: '#EF4444', items: ['chicken thighs','shrimp','chicken','beef','salmon'] },
  'Breakfast':      { icon: '🥣', color: '#F59E0B', items: ['cereal','granola mini','granola','oats'] },
  'Supplements':    { icon: '💪', color: '#F5820A', items: ['protein shakes','pre-workout','creatine','protein powder'] },
  'Snacks':         { icon: '🥜', color: '#84CC16', items: ['pistachios','almonds','cashews','nuts'] },
  'Other':          { icon: '🛍️', color: '#94A3B8', items: [] },
};

const WIFE_ITEMS   = ['raspberries','coconut yogurt','avocados'];
const SHARED_ITEMS = ['blueberries'];

const STARTER_ITEMS = [
  { name: 'Protein Milk',   freq: 7  },
  { name: 'Regular Milk',   freq: 7  },
  { name: 'Protein Yogurt', freq: 7  },
  { name: 'Coconut Yogurt', freq: 7  },
  { name: 'Carrots',        freq: 7  },
  { name: 'Apples',         freq: 7  },
  { name: 'Bananas',        freq: 7  },
  { name: 'Protein Shakes', freq: 7  },
  { name: 'Chicken Thighs', freq: 7  },
  { name: 'Blueberries',    freq: 7  },
  { name: 'Raspberries',    freq: 7  },
  { name: 'Shrimp',         freq: 14 },
  { name: 'Cereal',         freq: 14 },
  { name: 'Granola Mini',   freq: 14 },
  { name: 'Pre-Workout',    freq: 14 },
  { name: 'Creatine',       freq: 14 },
  { name: 'Avocados',       freq: 7  },
  { name: 'Pistachios',     freq: 14 },
];

const FREQ_PRESETS = [
  { label: 'Daily',        days: 1  },
  { label: 'Every 3 Days', days: 3  },
  { label: 'Weekly',       days: 7  },
  { label: 'Biweekly',     days: 14 },
  { label: 'Monthly',      days: 30 },
];

// ─── HELPERS ───────────────────────────────────────────────────────────────────

function categorize(name) {
  const lower = name.toLowerCase().trim();
  for (const [cat, data] of Object.entries(CATEGORIES)) {
    if (cat === 'Other') continue;
    if (data.items.some(k => lower.includes(k) || k.includes(lower))) return cat;
  }
  return 'Other';
}

function getOwnership(name) {
  const lower = name.toLowerCase().trim();
  if (WIFE_ITEMS.some(w => lower.includes(w) || w.includes(lower))) return 'wife';
  if (SHARED_ITEMS.some(s => lower.includes(s) || s.includes(lower))) return 'shared';
  return 'mine';
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function addDays(dateStr, days) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

function freqName(days) {
  if (days === 0) return 'As Needed';
  const preset = FREQ_PRESETS.find(p => p.days === days);
  return preset ? preset.label : `Every ${days} days`;
}

function emptyStore(shoppingDay) {
  return { shoppingDay: shoppingDay || null, items: [], history: [], schedules: [], lastSeedDate: null };
}

// ─── APP DATA LAYER ────────────────────────────────────────────────────────────
// loadAppData / saveAppData handle the full structure.
// loadData / saveData work only on the active store's slice.

function loadAppData() {
  const raw = JSON.parse(localStorage.getItem('groceryApp') || 'null');

  // Migration: old flat format had a top-level items array
  if (raw && Array.isArray(raw.items)) {
    const migrated = {
      activeStore: 'Sobeys',
      stores: {
        'Sobeys': {
          shoppingDay: 'Saturday',
          items:        raw.items        || [],
          history:      raw.history      || [],
          schedules:    raw.schedules    || [],
          lastSeedDate: raw.lastSeedDate || null
        }
      }
    };
    localStorage.setItem('groceryApp', JSON.stringify(migrated));
    return migrated;
  }

  return raw || {
    activeStore: 'Sobeys',
    stores: { 'Sobeys': emptyStore('Saturday') }
  };
}

function saveAppData(appData) {
  localStorage.setItem('groceryApp', JSON.stringify(appData));
}

function loadData() {
  const app = loadAppData();
  return app.stores[app.activeStore];
}

function saveData(storeData) {
  const app = loadAppData();
  app.stores[app.activeStore] = storeData;
  saveAppData(app);
}

// ─── SEED STARTER ITEMS (Sobeys only) ─────────────────────────────────────────

function seedStarterItems(storeData) {
  const app = loadAppData();
  if (app.activeStore !== 'Sobeys') return;
  if (storeData.lastSeedDate) return;
  const today = todayStr();
  STARTER_ITEMS.forEach(s => {
    const cat = categorize(s.name);
    storeData.history.push({ name: s.name, date: today, category: cat, seeded: true });
    storeData.schedules.push({ name: s.name, intervalDays: s.freq, nextDate: today, category: cat, seeded: true });
  });
  storeData.lastSeedDate = today;
  saveData(storeData);
}

// ─── SCHEDULING ────────────────────────────────────────────────────────────────

function checkSchedules(storeData) {
  const today = todayStr();
  const added = [];
  storeData.schedules.forEach(s => {
    if (s.nextDate <= today) {
      const alreadyOn = storeData.items.find(i => i.name.toLowerCase() === s.name.toLowerCase() && !i.checked);
      if (!alreadyOn) {
        storeData.items.push({
          id: Date.now() + Math.random(),
          name: s.name,
          category: categorize(s.name),
          checked: false,
          added: today,
          recurring: true,
          ownership: getOwnership(s.name)
        });
        added.push(s.name);
      }
      s.nextDate = addDays(today, s.intervalDays);
    }
  });
  return added;
}

// ─── FREQUENCY TRACKING ────────────────────────────────────────────────────────

function updateFrequency(storeData, name) {
  const lower = name.toLowerCase().trim();
  const entries = storeData.history.filter(h => h.name.toLowerCase() === lower && !h.seeded);
  if (entries.length < 2) return;
  const dates = entries.map(e => new Date(e.date)).sort((a, b) => a - b);
  let totalDays = 0;
  for (let i = 1; i < dates.length; i++) totalDays += (dates[i] - dates[i - 1]) / 86400000;
  const avgDays = Math.round(totalDays / (dates.length - 1));
  if (avgDays < 1) return;
  const existing = storeData.schedules.find(s => s.name.toLowerCase() === lower);
  if (existing) {
    existing.intervalDays = avgDays;
  } else {
    storeData.schedules.push({ name, intervalDays: avgDays, nextDate: addDays(todayStr(), avgDays), category: categorize(name), seeded: false });
  }
}

// ─── FREQUENCY SELECTOR (add bar) ─────────────────────────────────────────────

let selectedFreqDays = 7;

function selectFreq(el) {
  document.querySelectorAll('.freq-pill').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
  selectedFreqDays = parseInt(el.dataset.days);
}

// ─── ADD ITEM ──────────────────────────────────────────────────────────────────

function addItem() {
  const input = document.getElementById('add-input');
  const name = input.value.trim();
  if (!name) return;
  const storeData = loadData();
  const cat = categorize(name);
  const today = todayStr();
  storeData.items.push({ id: Date.now(), name, category: cat, checked: false, added: today, recurring: false, ownership: getOwnership(name) });
  storeData.history.push({ name, date: today, category: cat, seeded: false });
  if (selectedFreqDays > 0) {
    const existing = storeData.schedules.find(s => s.name.toLowerCase() === name.toLowerCase());
    if (existing) {
      existing.intervalDays = selectedFreqDays;
    } else {
      storeData.schedules.push({ name, intervalDays: selectedFreqDays, nextDate: addDays(today, selectedFreqDays), category: cat, seeded: false });
    }
  }
  if (selectedFreqDays !== 0) updateFrequency(storeData, name);
  saveData(storeData);
  input.value = '';
  renderList();
  showToast(`"${name}" added · ${freqName(selectedFreqDays)}`);
}

document.getElementById('add-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItem();
});

// ─── TOGGLE CHECK ──────────────────────────────────────────────────────────────

function toggleCheck(id) {
  const storeData = loadData();
  const item = storeData.items.find(i => i.id === id);
  if (item) item.checked = !item.checked;
  saveData(storeData);
  renderList();
}

// ─── DELETE ITEM ───────────────────────────────────────────────────────────────

function deleteItem(id, e) {
  e.stopPropagation();
  const storeData = loadData();
  storeData.items = storeData.items.filter(i => i.id !== id);
  saveData(storeData);
  renderList();
}

// ─── RENDER LIST ───────────────────────────────────────────────────────────────

function renderList() {
  const storeData = loadData();
  const container = document.getElementById('list-container');
  const total = storeData.items.length;
  const checked = storeData.items.filter(i => i.checked).length;
  const pct = total ? Math.round((checked / total) * 100) : 0;
  document.getElementById('progress-text').textContent = `${checked} of ${total} items checked`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;
  document.getElementById('header-subtitle').textContent =
    total ? `${total - checked} item${total - checked !== 1 ? 's' : ''} remaining` : 'Your list is empty — add an item above';

  if (!total) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-text">Add your first item above</div></div>`;
    return;
  }

  const groups = {};
  storeData.items.forEach(item => {
    if (!groups[item.category]) groups[item.category] = [];
    groups[item.category].push(item);
  });

  let html = '';
  const catOrder = Object.keys(CATEGORIES);
  const sorted = Object.keys(groups).sort((a, b) => {
    const ai = catOrder.indexOf(a), bi = catOrder.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });

  sorted.forEach(cat => {
    const catData = CATEGORIES[cat] || { icon: '🛍️' };
    const items = groups[cat];
    const unchecked = items.filter(i => !i.checked);
    const ordered = [...unchecked, ...items.filter(i => i.checked)];

    html += `<div class="section"><div class="section-header">
      <span class="section-icon">${catData.icon}</span>
      <span class="section-name">${cat}</span>
      <span class="section-count">${unchecked.length}/${items.length}</span>
    </div>`;

    ordered.forEach(item => {
      let badge = '';
      if (item.ownership === 'wife') badge = `<span class="item-badge badge-wife">Wife</span>`;
      else if (item.ownership === 'shared') badge = `<span class="item-badge badge-shared">Shared</span>`;
      else if (item.recurring) badge = `<span class="item-badge badge-recurring">↻ Weekly</span>`;
      html += `<div class="item-card ${item.checked ? 'checked' : ''}" onclick="toggleCheck(${item.id})">
        <div class="item-check">${item.checked ? '✓' : ''}</div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-meta">${item.category}</div>
        </div>
        ${badge}
        <button class="item-delete" onclick="deleteItem(${item.id}, event)">✕</button>
      </div>`;
    });

    html += `</div><div class="divider"></div>`;
  });

  container.innerHTML = html;
}

// ─── RENDER HISTORY ────────────────────────────────────────────────────────────

function renderHistory() {
  const storeData = loadData();
  const container = document.getElementById('history-container');
  const freq = {};
  storeData.history.filter(h => !h.seeded).forEach(h => {
    if (!freq[h.name]) freq[h.name] = { count: 0, category: h.category, lastDate: h.date };
    freq[h.name].count++;
    if (h.date > freq[h.name].lastDate) freq[h.name].lastDate = h.date;
  });
  const entries = Object.entries(freq).sort((a, b) => b[1].count - a[1].count);
  if (!entries.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No history yet — add items to your list</div></div>`;
    return;
  }
  let html = '';
  entries.forEach(([name, info]) => {
    const cat = CATEGORIES[info.category] || { icon: '🛍️' };
    html += `<div class="schedule-card">
      <div class="schedule-card-header">
        <div class="schedule-item-name">${cat.icon} ${name}</div>
        <span class="schedule-freq">${info.count}× added</span>
      </div>
      <div class="schedule-next">Last added: ${info.lastDate} · Category: ${info.category}</div>
    </div>`;
  });
  container.innerHTML = html;
}

// ─── CHANGE FREQUENCY (schedule page) ─────────────────────────────────────────

function changeFrequency(name, days) {
  const storeData = loadData();
  const existing = storeData.schedules.find(s => s.name.toLowerCase() === name.toLowerCase());
  if (days === 0) {
    storeData.schedules = storeData.schedules.filter(s => s.name.toLowerCase() !== name.toLowerCase());
    saveData(storeData);
    showToast(`"${name}" removed from auto-schedule`);
  } else if (existing) {
    existing.intervalDays = days;
    existing.nextDate = addDays(todayStr(), days);
    saveData(storeData);
    showToast(`"${name}" set to ${freqName(days)}`);
  }
  renderSchedule();
}

// ─── RENDER SCHEDULE ───────────────────────────────────────────────────────────

function renderSchedule() {
  const storeData = loadData();
  const container = document.getElementById('schedule-container');
  if (!storeData.schedules.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔁</div><div class="empty-text">No scheduled items yet</div></div>`;
    return;
  }
  const sorted = [...storeData.schedules].sort((a, b) => a.nextDate.localeCompare(b.nextDate));
  let html = '';
  sorted.forEach(s => {
    const cat = CATEGORIES[s.category] || { icon: '🛍️' };
    const currentFreq = freqName(s.intervalDays);
    let pillsHtml = FREQ_PRESETS.map(p => {
      const isCurrent = p.days === s.intervalDays;
      return `<span class="freq-change-pill ${isCurrent ? 'current' : ''}" onclick="changeFrequency('${s.name.replace(/'/g,"\\'")}', ${p.days})">${p.label}</span>`;
    }).join('');
    pillsHtml += `<span class="freq-change-pill remove" onclick="changeFrequency('${s.name.replace(/'/g,"\\'")}', 0)">✕ As Needed</span>`;
    html += `<div class="schedule-card">
      <div class="schedule-card-header">
        <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
          <div class="schedule-item-name">${cat.icon} ${s.name}</div>
          <span class="schedule-freq">${currentFreq}</span>
        </div>
        <button class="item-delete" onclick="deleteScheduledItem('${s.name.replace(/'/g,"\\'")}')">✕</button>
      </div>
      <div class="schedule-next">Next up: ${s.nextDate}</div>
      <div class="freq-change-row">${pillsHtml}</div>
    </div>`;
  });
  container.innerHTML = html;
}

// ─── DELETE SCHEDULED ITEM ─────────────────────────────────────────────────────

function deleteScheduledItem(name) {
  const storeData = loadData();
  storeData.schedules = storeData.schedules.filter(s => s.name.toLowerCase() !== name.toLowerCase());
  saveData(storeData);
  renderSchedule();
}

// ─── ADD SCHEDULE MODAL ────────────────────────────────────────────────────────

function openAddScheduleModal() {
  document.getElementById('sched-modal-name').value = '';
  document.getElementById('sched-modal-name').classList.remove('error');
  document.getElementById('sched-modal-error').textContent = '';
  document.getElementById('sched-modal-freq').value = '7';
  updateFirstAppearance();
  document.getElementById('schedule-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('sched-modal-name').focus(), 100);
}

function closeAddScheduleModal() {
  document.getElementById('schedule-modal').style.display = 'none';
}

function handleScheduleModalOverlayClick(e) {
  if (e.target === document.getElementById('schedule-modal')) closeAddScheduleModal();
}

function updateFirstAppearance() {
  const days = parseInt(document.getElementById('sched-modal-freq').value);
  const d = new Date();
  d.setDate(d.getDate() + days);
  const formatted = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  document.getElementById('sched-modal-date').textContent = 'Will first appear on: ' + formatted;
}

function createScheduledItem() {
  const nameInput = document.getElementById('sched-modal-name');
  const errorEl = document.getElementById('sched-modal-error');
  const name = nameInput.value.trim();
  const days = parseInt(document.getElementById('sched-modal-freq').value);
  errorEl.textContent = '';
  nameInput.classList.remove('error');
  if (!name) {
    errorEl.textContent = 'Item name is required';
    nameInput.classList.add('error');
    nameInput.focus();
    return;
  }
  const storeData = loadData();
  const duplicate = storeData.schedules.some(s => s.name.toLowerCase() === name.toLowerCase());
  if (duplicate) {
    errorEl.textContent = 'This item is already scheduled';
    nameInput.classList.add('error');
    nameInput.focus();
    return;
  }
  const nextDate = addDays(todayStr(), days);
  storeData.schedules.push({ name, intervalDays: days, nextDate, category: categorize(name), seeded: false });
  saveData(storeData);
  closeAddScheduleModal();
  renderSchedule();
}

// ─── STORE SWITCHER ────────────────────────────────────────────────────────────

function updateStoreHeader() {
  const app = loadAppData();
  const store = app.stores[app.activeStore];
  const day = store.shoppingDay;
  let label = '🛒 ' + app.activeStore;
  if (day) {
    // Abbreviate day to 3 letters
    const shortDay = day.length > 3 ? day.slice(0, 3) : day;
    const today = new Date().toLocaleDateString('en-US', { weekday: 'long' });
    label += today === day ? ` · Today!` : ` · ${shortDay}`;
  }
  document.getElementById('store-btn-label').textContent = label;
}

function renderStoreDropdown() {
  const app = loadAppData();
  const dropdown = document.getElementById('store-dropdown');
  let html = '';
  Object.keys(app.stores).forEach(name => {
    const store = app.stores[name];
    const isActive = name === app.activeStore;
    const dayLabel = store.shoppingDay ? `<span class="store-day">${store.shoppingDay}</span>` : '';
    html += `<div class="store-dropdown-item ${isActive ? 'active' : ''}" onclick="switchStore('${name.replace(/'/g,"\\'")}')">
      ${isActive ? '✓ ' : ''}${name}${dayLabel}
    </div>`;
  });
  html += `<div class="store-dropdown-divider"></div>`;
  html += `<div class="store-dropdown-add" onclick="openAddStoreModal()">＋ Add new store</div>`;
  dropdown.innerHTML = html;
}

function toggleStoreDropdown(e) {
  e.stopPropagation();
  const dropdown = document.getElementById('store-dropdown');
  const isOpen = dropdown.style.display !== 'none';
  if (isOpen) {
    dropdown.style.display = 'none';
  } else {
    renderStoreDropdown();
    dropdown.style.display = 'block';
  }
}

function closeDropdown() {
  document.getElementById('store-dropdown').style.display = 'none';
}

document.addEventListener('click', function(e) {
  const wrap = document.querySelector('.store-btn-wrap');
  if (wrap && !wrap.contains(e.target)) closeDropdown();
});

function switchStore(name) {
  const app = loadAppData();
  app.activeStore = name;
  saveAppData(app);
  closeDropdown();
  updateStoreHeader();
  renderList();
}

// ─── ADD STORE MODAL ───────────────────────────────────────────────────────────

function openAddStoreModal() {
  closeDropdown();
  document.getElementById('modal-store-name').value = '';
  document.getElementById('modal-shopping-day').value = '';
  document.getElementById('modal-name-error').textContent = '';
  document.getElementById('modal-store-name').classList.remove('error');
  document.getElementById('store-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('modal-store-name').focus(), 100);
}

function closeStoreModal() {
  document.getElementById('store-modal').style.display = 'none';
}

function handleModalOverlayClick(e) {
  if (e.target === document.getElementById('store-modal')) closeStoreModal();
}

function createStore() {
  const nameInput = document.getElementById('modal-store-name');
  const dayInput = document.getElementById('modal-shopping-day');
  const errorEl = document.getElementById('modal-name-error');
  const name = nameInput.value.trim();
  const day = dayInput.value.trim() || null;

  // Validation
  errorEl.textContent = '';
  nameInput.classList.remove('error');
  if (!name) {
    errorEl.textContent = 'Store name is required';
    nameInput.classList.add('error');
    nameInput.focus();
    return;
  }
  const app = loadAppData();
  const duplicate = Object.keys(app.stores).some(k => k.toLowerCase() === name.toLowerCase());
  if (duplicate) {
    errorEl.textContent = 'A store with this name already exists';
    nameInput.classList.add('error');
    nameInput.focus();
    return;
  }

  // Create store with empty data
  app.stores[name] = emptyStore(day);
  app.activeStore = name;
  saveAppData(app);
  closeStoreModal();
  updateStoreHeader();
  renderList();
  showToast(`"${name}" created`);
}

// ─── NAVIGATION ────────────────────────────────────────────────────────────────

function showPage(page) {
  ['list','history','schedule'].forEach(p => {
    document.getElementById(`page-${p}`).classList.toggle('active', p === page);
    document.getElementById(`nav-${p}`).classList.toggle('active', p === page);
  });
  if (page === 'history') renderHistory();
  if (page === 'schedule') renderSchedule();
}

// ─── TOAST ─────────────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── INIT ──────────────────────────────────────────────────────────────────────

(function init() {
  const storeData = loadData();
  seedStarterItems(storeData);
  const added = checkSchedules(storeData);
  saveData(storeData);
  renderList();
  updateStoreHeader();
  if (added.length) {
    setTimeout(() => showToast(`↻ Auto-added ${added.length} recurring item${added.length > 1 ? 's' : ''}`), 600);
  }
})();
</script>
</body>
</html>
