<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My Grocery List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #F5820A;
      --orange-light: #FEF3E7;
      --yellow: #F5C518;
      --yellow-light: #FEFAE8;
      --blue: #3B82F6;
      --blue-light: #EFF6FF;
      --bg: #FFFFFF;
      --surface: #F9F9F9;
      --text: #1A1A1A;
      --text-muted: #888;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 90px;
      -webkit-overflow-scrolling: touch;
    }

    /* HEADER */
    .header {
      padding: 24px 20px 12px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .header-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .header-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .store-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--orange-light);
      color: var(--orange);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 99px;
    }

    /* ADD ITEM BAR */
    .add-bar {
      display: flex;
      gap: 8px;
      padding: 0 20px 8px;
    }
    .add-input {
      flex: 1;
      border: 2px solid #F0F0F0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s;
    }
    .add-input:focus { border-color: var(--orange); }
    .add-btn {
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .add-btn:active { transform: scale(0.94); }

    /* FREQUENCY PICKER (add bar) */
    .freq-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 20px 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .freq-row::-webkit-scrollbar { display: none; }
    .freq-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      flex-shrink: 0;
    }
    .freq-pill {
      font-size: 12px;
      font-weight: 600;
      padding: 15px 12px;
      border-radius: 99px;
      border: 2px solid #F0F0F0;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .freq-pill.selected {
      background: var(--orange);
      border-color: var(--orange);
      color: white;
    }

    /* FREQUENCY CHANGE PILLS (schedule cards) */
    .freq-change-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .freq-change-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 16px 10px;
      border-radius: 99px;
      border: 1.5px solid #E8E8E8;
      background: white;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .freq-change-pill:active { transform: scale(0.95); }
    .freq-change-pill.current {
      background: var(--orange-light);
      border-color: var(--orange);
      color: var(--orange);
    }
    .freq-change-pill.remove {
      border-color: #FECACA;
      color: #EF4444;
    }
    .freq-change-pill.remove:hover {
      background: #FEF2F2;
    }

    /* PROGRESS BAR */
    .progress-wrap {
      padding: 0 20px 20px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 8px;
      background: #F0F0F0;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--orange), var(--yellow));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* SECTION */
    .section { padding: 0 20px 8px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .section-icon { font-size: 18px; }
    .section-name {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    .section-count {
      font-size: 11px;
      background: #F0F0F0;
      color: var(--text-muted);
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 600;
    }

    /* ITEM CARD */
    .item-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      border: 2px solid #F0F0F0;
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, opacity 0.2s;
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .item-card:active { transform: scale(0.98); }
    .item-card.checked {
      background: #FAFAFA;
      border-color: #E8E8E8;
      opacity: 0.7;
    }
    .item-check {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2.5px solid #DDD;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .item-card.checked .item-check {
      background: var(--orange);
      border-color: var(--orange);
      color: white;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-size: 15px;
      font-weight: 600;
      transition: text-decoration 0.2s;
    }
    .item-card.checked .item-name {
      text-decoration: line-through;
      color: var(--text-muted);
    }
    .item-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .item-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 99px;
      flex-shrink: 0;
    }
    .badge-recurring {
      background: var(--orange-light);
      color: var(--orange);
    }
    .badge-wife {
      background: var(--blue-light);
      color: var(--blue);
    }
    .badge-shared {
      background: var(--yellow-light);
      color: #B8940A;
    }
    .item-delete {
      background: none;
      border: none;
      color: #CCC;
      font-size: 16px;
      cursor: pointer;
      padding: 13px 4px;
      border-radius: 8px;
      flex-shrink: 0;
      transition: color 0.2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .item-delete:hover { color: #FF4444; }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--bg);
      border-top: 1px solid #F0F0F0;
      display: flex;
      padding: 10px 0 calc(16px + env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      padding: 6px 4px;
      border-radius: 12px;
      transition: background 0.2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item:active { background: var(--surface); }
    .nav-icon { font-size: 22px; }
    .nav-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .nav-item.active .nav-label { color: var(--orange); }
    .nav-item.active .nav-icon { filter: none; }

    /* PAGE */
    .page { display: none; }
    .page.active { display: block; }

    /* SCHEDULE PAGE */
    .schedule-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      margin: 0 20px 12px;
    }
    .schedule-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .schedule-item-name {
      font-size: 15px;
      font-weight: 700;
    }
    .schedule-freq {
      font-size: 12px;
      color: var(--orange);
      font-weight: 600;
      background: var(--orange-light);
      padding: 3px 9px;
      border-radius: 99px;
    }
    .schedule-next {
      font-size: 12px;
      color: var(--text-muted);
    }
    .page-title {
      font-size: 22px;
      font-weight: 800;
      padding: 24px 20px 16px;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 48px 32px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1A1A1A;
      color: white;
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      z-index: 200;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* DIVIDER */
    .divider { height: 12px; }
  </style>
</head>
<body>

<!-- PAGES -->
<div id="page-list" class="page active">
  <div class="header">
    <div class="header-top">
      <div class="header-title">My Groceries</div>
      <span class="store-badge" id="store-badge">🛒 Sobeys · Sat</span>
    </div>
    <div class="header-subtitle" id="header-subtitle">Loading your list...</div>
  </div>

  <div class="add-bar">
    <input class="add-input" id="add-input" type="text" placeholder="Add an item…" autocomplete="off" />
    <button class="add-btn" onclick="addItem()">+</button>
  </div>
  <div class="freq-row">
    <span class="freq-label">Schedule:</span>
    <span class="freq-pill" data-days="1" onclick="selectFreq(this)">Daily</span>
    <span class="freq-pill" data-days="3" onclick="selectFreq(this)">Every 3 Days</span>
    <span class="freq-pill selected" data-days="7" onclick="selectFreq(this)">Weekly</span>
    <span class="freq-pill" data-days="14" onclick="selectFreq(this)">Biweekly</span>
    <span class="freq-pill" data-days="30" onclick="selectFreq(this)">Monthly</span>
    <span class="freq-pill" data-days="0" onclick="selectFreq(this)">As Needed</span>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">0 of 0 items checked</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div id="list-container"></div>
</div>

<div id="page-history" class="page">
  <div class="page-title">Item History</div>
  <div id="history-container"></div>
</div>

<div id="page-schedule" class="page">
  <div class="page-title">Auto-Schedule</div>
  <div id="schedule-container"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" id="nav-list" onclick="showPage('list')">
    <div class="nav-icon">🛒</div>
    <div class="nav-label">List</div>
  </div>
  <div class="nav-item" id="nav-history" onclick="showPage('history')">
    <div class="nav-icon">📋</div>
    <div class="nav-label">History</div>
  </div>
  <div class="nav-item" id="nav-schedule" onclick="showPage('schedule')">
    <div class="nav-icon">🔁</div>
    <div class="nav-label">Schedule</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── DATA LAYER ────────────────────────────────────────────────────────────────

const CATEGORIES = {
  'Produce':          { icon: '🥦', color: '#22C55E', items: ['carrots','apples','bananas','avocados','blueberries','raspberries'] },
  'Dairy & Milk':     { icon: '🥛', color: '#3B82F6', items: ['protein milk','regular milk','milk'] },
  'Yogurt':           { icon: '🫙', color: '#A78BFA', items: ['protein yogurt','coconut yogurt','yogurt'] },
  'Meat & Seafood':   { icon: '🍗', color: '#EF4444', items: ['chicken thighs','shrimp','chicken','beef','salmon'] },
  'Breakfast':        { icon: '🥣', color: '#F59E0B', items: ['cereal','granola mini','granola','oats'] },
  'Supplements':      { icon: '💪', color: '#F5820A', items: ['protein shakes','pre-workout','creatine','protein powder'] },
  'Snacks':           { icon: '🥜', color: '#84CC16', items: ['pistachios','almonds','cashews','nuts'] },
  'Other':            { icon: '🛍️', color: '#94A3B8', items: [] },
};

// Items that belong to wife only or shared
const WIFE_ITEMS = ['raspberries','coconut yogurt','avocados'];
const SHARED_ITEMS = ['blueberries'];

function categorize(name) {
  const lower = name.toLowerCase().trim();
  for (const [cat, data] of Object.entries(CATEGORIES)) {
    if (cat === 'Other') continue;
    if (data.items.some(k => lower.includes(k) || k.includes(lower))) return cat;
  }
  return 'Other';
}

function getOwnership(name) {
  const lower = name.toLowerCase().trim();
  if (WIFE_ITEMS.some(w => lower.includes(w) || w.includes(lower))) return 'wife';
  if (SHARED_ITEMS.some(s => lower.includes(s) || s.includes(lower))) return 'shared';
  return 'mine';
}

function loadData() {
  return JSON.parse(localStorage.getItem('groceryApp') || 'null') || {
    items: [],          // current list items
    history: [],        // log of every addition: {name, date, category}
    schedules: [],      // {name, intervalDays, nextDate, category}
    lastSeedDate: null
  };
}

function saveData(data) {
  localStorage.setItem('groceryApp', JSON.stringify(data));
}

// ─── SEED STARTER ITEMS ────────────────────────────────────────────────────────

const STARTER_ITEMS = [
  { name: 'Protein Milk',    freq: 7  },
  { name: 'Regular Milk',    freq: 7  },
  { name: 'Protein Yogurt',  freq: 7  },
  { name: 'Coconut Yogurt',  freq: 7  },
  { name: 'Carrots',         freq: 7  },
  { name: 'Apples',          freq: 7  },
  { name: 'Bananas',         freq: 7  },
  { name: 'Protein Shakes',  freq: 7  },
  { name: 'Chicken Thighs',  freq: 7  },
  { name: 'Blueberries',     freq: 7  },
  { name: 'Raspberries',     freq: 7  },
  { name: 'Shrimp',          freq: 14 },
  { name: 'Cereal',          freq: 14 },
  { name: 'Granola Mini',    freq: 14 },
  { name: 'Pre-Workout',     freq: 14 },
  { name: 'Creatine',        freq: 14 },
  { name: 'Avocados',        freq: 7  },
  { name: 'Pistachios',      freq: 14 },
];

function seedStarterItems(data) {
  if (data.lastSeedDate) return; // already seeded
  const today = todayStr();

  STARTER_ITEMS.forEach(s => {
    const cat = categorize(s.name);
    // Add to history as a baseline data point
    data.history.push({ name: s.name, date: today, category: cat, seeded: true });
    // Schedule based on known routine
    data.schedules.push({
      name: s.name,
      intervalDays: s.freq,
      nextDate: today,
      category: cat,
      seeded: true
    });
  });

  data.lastSeedDate = today;
  saveData(data);
}

// ─── SCHEDULING ────────────────────────────────────────────────────────────────

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function addDays(dateStr, days) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

function checkSchedules(data) {
  const today = todayStr();
  let added = [];
  data.schedules.forEach(s => {
    if (s.nextDate <= today) {
      // Check if item already on list
      const alreadyOn = data.items.find(i => i.name.toLowerCase() === s.name.toLowerCase() && !i.checked);
      if (!alreadyOn) {
        const cat = categorize(s.name);
        data.items.push({
          id: Date.now() + Math.random(),
          name: s.name,
          category: cat,
          checked: false,
          added: today,
          recurring: true,
          ownership: getOwnership(s.name)
        });
        added.push(s.name);
      }
      s.nextDate = addDays(today, s.intervalDays);
    }
  });
  return added;
}

// ─── FREQUENCY TRACKING ────────────────────────────────────────────────────────

function updateFrequency(data, name) {
  const lower = name.toLowerCase().trim();
  const entries = data.history.filter(h => h.name.toLowerCase() === lower && !h.seeded);
  if (entries.length < 2) return; // need at least 2 real data points

  // Calculate average interval
  const dates = entries.map(e => new Date(e.date)).sort((a,b) => a-b);
  let totalDays = 0;
  for (let i = 1; i < dates.length; i++) {
    totalDays += (dates[i] - dates[i-1]) / 86400000;
  }
  const avgDays = Math.round(totalDays / (dates.length - 1));
  if (avgDays < 1) return;

  // Update or create schedule
  const existing = data.schedules.find(s => s.name.toLowerCase() === lower);
  if (existing) {
    existing.intervalDays = avgDays;
  } else {
    data.schedules.push({
      name: name,
      intervalDays: avgDays,
      nextDate: addDays(todayStr(), avgDays),
      category: categorize(name),
      seeded: false
    });
  }
}

// ─── FREQUENCY SELECTOR (add bar) ─────────────────────────────────────────────

let selectedFreqDays = 7; // default: weekly

function selectFreq(el) {
  document.querySelectorAll('.freq-pill').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
  selectedFreqDays = parseInt(el.dataset.days);
}

// ─── ADD ITEM ──────────────────────────────────────────────────────────────────

function addItem() {
  const input = document.getElementById('add-input');
  const name = input.value.trim();
  if (!name) return;

  const data = loadData();
  const cat = categorize(name);
  const ownership = getOwnership(name);
  const today = todayStr();

  // Add to list
  data.items.push({
    id: Date.now(),
    name: name,
    category: cat,
    checked: false,
    added: today,
    recurring: false,
    ownership
  });

  // Track history
  data.history.push({ name, date: today, category: cat, seeded: false });

  // Apply chosen schedule frequency
  if (selectedFreqDays > 0) {
    const existing = data.schedules.find(s => s.name.toLowerCase() === name.toLowerCase());
    if (existing) {
      existing.intervalDays = selectedFreqDays;
    } else {
      data.schedules.push({
        name,
        intervalDays: selectedFreqDays,
        nextDate: addDays(today, selectedFreqDays),
        category: cat,
        seeded: false
      });
    }
  }

  // Also auto-learn from history if no manual freq was set to 0
  if (selectedFreqDays !== 0) updateFrequency(data, name);

  const freqLabel = freqName(selectedFreqDays);
  saveData(data);
  input.value = '';
  renderList();
  showToast(`"${name}" added · ${freqLabel}`);
}

document.getElementById('add-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItem();
});

// ─── TOGGLE CHECK ──────────────────────────────────────────────────────────────

function toggleCheck(id) {
  const data = loadData();
  const item = data.items.find(i => i.id === id);
  if (item) item.checked = !item.checked;
  saveData(data);
  renderList();
}

// ─── DELETE ITEM ───────────────────────────────────────────────────────────────

function deleteItem(id, e) {
  e.stopPropagation();
  const data = loadData();
  data.items = data.items.filter(i => i.id !== id);
  saveData(data);
  renderList();
}

// ─── RENDER LIST ───────────────────────────────────────────────────────────────

function renderList() {
  const data = loadData();
  const container = document.getElementById('list-container');
  const total = data.items.length;
  const checked = data.items.filter(i => i.checked).length;

  // Progress
  const pct = total ? Math.round((checked / total) * 100) : 0;
  document.getElementById('progress-text').textContent = `${checked} of ${total} items checked`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;
  document.getElementById('header-subtitle').textContent =
    total ? `${total - checked} item${total - checked !== 1 ? 's' : ''} remaining` : 'Your list is empty — add an item above';

  if (!total) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-text">Add your first item above</div></div>`;
    return;
  }

  // Group by category
  const groups = {};
  data.items.forEach(item => {
    if (!groups[item.category]) groups[item.category] = [];
    groups[item.category].push(item);
  });

  let html = '';
  const catOrder = Object.keys(CATEGORIES);
  const sorted = Object.keys(groups).sort((a, b) => {
    const ai = catOrder.indexOf(a), bi = catOrder.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });

  sorted.forEach(cat => {
    const catData = CATEGORIES[cat] || { icon: '🛍️' };
    const items = groups[cat];
    const unchecked = items.filter(i => !i.checked);
    const checkedItems = items.filter(i => i.checked);
    const ordered = [...unchecked, ...checkedItems];

    html += `<div class="section">
      <div class="section-header">
        <span class="section-icon">${catData.icon}</span>
        <span class="section-name">${cat}</span>
        <span class="section-count">${unchecked.length}/${items.length}</span>
      </div>`;

    ordered.forEach(item => {
      let badge = '';
      if (item.ownership === 'wife') badge = `<span class="item-badge badge-wife">Wife</span>`;
      else if (item.ownership === 'shared') badge = `<span class="item-badge badge-shared">Shared</span>`;
      else if (item.recurring) badge = `<span class="item-badge badge-recurring">↻ Weekly</span>`;

      html += `<div class="item-card ${item.checked ? 'checked' : ''}" onclick="toggleCheck(${item.id})">
        <div class="item-check">${item.checked ? '✓' : ''}</div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-meta">${item.category}</div>
        </div>
        ${badge}
        <button class="item-delete" onclick="deleteItem(${item.id}, event)">✕</button>
      </div>`;
    });

    html += `</div><div class="divider"></div>`;
  });

  container.innerHTML = html;
}

// ─── RENDER HISTORY ────────────────────────────────────────────────────────────

function renderHistory() {
  const data = loadData();
  const container = document.getElementById('history-container');

  // Aggregate by item name
  const freq = {};
  data.history.filter(h => !h.seeded).forEach(h => {
    if (!freq[h.name]) freq[h.name] = { count: 0, category: h.category, lastDate: h.date };
    freq[h.name].count++;
    if (h.date > freq[h.name].lastDate) freq[h.name].lastDate = h.date;
  });

  const entries = Object.entries(freq).sort((a,b) => b[1].count - a[1].count);
  if (!entries.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No history yet — add items to your list</div></div>`;
    return;
  }

  let html = '';
  entries.forEach(([name, info]) => {
    const cat = CATEGORIES[info.category] || { icon: '🛍️' };
    html += `<div class="schedule-card">
      <div class="schedule-card-header">
        <div class="schedule-item-name">${cat.icon} ${name}</div>
        <span class="schedule-freq">${info.count}× added</span>
      </div>
      <div class="schedule-next">Last added: ${info.lastDate} · Category: ${info.category}</div>
    </div>`;
  });
  container.innerHTML = html;
}

// ─── FREQ HELPERS ──────────────────────────────────────────────────────────────

const FREQ_PRESETS = [
  { label: 'Daily',       days: 1  },
  { label: 'Every 3 Days', days: 3 },
  { label: 'Weekly',      days: 7  },
  { label: 'Biweekly',    days: 14 },
  { label: 'Monthly',     days: 30 },
];

function freqName(days) {
  if (days === 0) return 'As Needed';
  const preset = FREQ_PRESETS.find(p => p.days === days);
  return preset ? preset.label : `Every ${days} days`;
}

// ─── CHANGE FREQUENCY (schedule page) ─────────────────────────────────────────

function changeFrequency(name, days) {
  const data = loadData();
  const existing = data.schedules.find(s => s.name.toLowerCase() === name.toLowerCase());
  if (days === 0) {
    // "As Needed" — remove from schedule
    data.schedules = data.schedules.filter(s => s.name.toLowerCase() !== name.toLowerCase());
    saveData(data);
    showToast(`"${name}" removed from auto-schedule`);
  } else if (existing) {
    existing.intervalDays = days;
    existing.nextDate = addDays(todayStr(), days);
    saveData(data);
    showToast(`"${name}" set to ${freqName(days)}`);
  }
  renderSchedule();
}

// ─── RENDER SCHEDULE ───────────────────────────────────────────────────────────

function renderSchedule() {
  const data = loadData();
  const container = document.getElementById('schedule-container');

  if (!data.schedules.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔁</div><div class="empty-text">No scheduled items yet</div></div>`;
    return;
  }

  const sorted = [...data.schedules].sort((a,b) => a.nextDate.localeCompare(b.nextDate));
  let html = '';
  sorted.forEach(s => {
    const cat = CATEGORIES[s.category] || { icon: '🛍️' };
    const currentFreq = freqName(s.intervalDays);

    // Build preset pills
    let pillsHtml = FREQ_PRESETS.map(p => {
      const isCurrent = p.days === s.intervalDays;
      return `<span class="freq-change-pill ${isCurrent ? 'current' : ''}" onclick="changeFrequency('${s.name.replace(/'/g,"\\'")}', ${p.days})">${p.label}</span>`;
    }).join('');
    pillsHtml += `<span class="freq-change-pill remove" onclick="changeFrequency('${s.name.replace(/'/g,"\\'")}', 0)">✕ As Needed</span>`;

    html += `<div class="schedule-card">
      <div class="schedule-card-header">
        <div class="schedule-item-name">${cat.icon} ${s.name}</div>
        <span class="schedule-freq">${currentFreq}</span>
      </div>
      <div class="schedule-next">Next up: ${s.nextDate}</div>
      <div class="freq-change-row">${pillsHtml}</div>
    </div>`;
  });
  container.innerHTML = html;
}

// ─── NAVIGATION ────────────────────────────────────────────────────────────────

function showPage(page) {
  ['list','history','schedule'].forEach(p => {
    document.getElementById(`page-${p}`).classList.toggle('active', p === page);
    document.getElementById(`nav-${p}`).classList.toggle('active', p === page);
  });
  if (page === 'history') renderHistory();
  if (page === 'schedule') renderSchedule();
}

// ─── TOAST ─────────────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── STORE BADGE ───────────────────────────────────────────────────────────────

function updateStoreBadge() {
  const day = new Date().getDay(); // 0=Sun, 6=Sat
  const badge = document.getElementById('store-badge');
  if (day === 6) badge.textContent = '🛒 Sobeys · Today!';
  else badge.textContent = '🛒 Sobeys · Sat';
}

// ─── INIT ──────────────────────────────────────────────────────────────────────

(function init() {
  const data = loadData();
  seedStarterItems(data);
  const added = checkSchedules(data);
  saveData(data);
  renderList();
  updateStoreBadge();
  if (added.length) {
    setTimeout(() => showToast(`↻ Auto-added ${added.length} recurring item${added.length > 1 ? 's' : ''}`), 600);
  }
})();
</script>
</body>
