<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My Grocery List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #F5820A;
      --orange-light: #FEF3E7;
      --yellow: #F5C518;
      --yellow-light: #FEFAE8;
      --blue: #3B82F6;
      --blue-light: #EFF6FF;
      --bg: #FFFFFF;
      --surface: #F9F9F9;
      --text: #1A1A1A;
      --text-muted: #888;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 160px;
      -webkit-overflow-scrolling: touch;
    }

    /* HEADER */
    .header {
      padding: 24px 20px 12px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .header-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .header-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* STORE SWITCHER BUTTON */
    .store-btn-wrap { position: relative; }
    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--orange-light);
      color: var(--orange);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 99px;
      border: none;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .store-chevron { font-size: 10px; }

    /* STORE DROPDOWN */
    .store-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--bg);
      border: 1.5px solid #F0F0F0;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 180px;
      z-index: 50;
      overflow: hidden;
    }
    .store-dropdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .store-dropdown-item:hover { background: var(--surface); }
    .store-dropdown-item.active { color: var(--orange); }
    .store-dropdown-item .store-day {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      margin-left: auto;
    }
    .store-item-count {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      margin-left: 6px;
    }
    .store-dropdown-divider { height: 1px; background: #F0F0F0; }
    .store-dropdown-add {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .store-dropdown-add:hover { background: var(--blue-light); }

    /* ADD ITEM BAR */
    .add-bar {
      display: flex;
      gap: 8px;
      padding: 0 20px 8px;
    }
    .add-input {
      flex: 1;
      border: 2px solid #F0F0F0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s;
    }
    .add-input:focus { border-color: var(--orange); }
    .autocomplete-wrap {
      position: relative;
      flex: 1;
    }
    .autocomplete-list {
      position: absolute;
      bottom: calc(100% + 4px);
      top: auto;
      left: 0;
      right: 0;
      background: var(--bg);
      border: 2px solid #F0F0F0;
      border-radius: 12px;
      list-style: none;
      margin: 0;
      padding: 4px 0;
      z-index: 200;
      box-shadow: var(--shadow);
      display: none;
      max-height: 200px;
      overflow-y: auto;
    }
    .autocomplete-list li {
      padding: 11px 16px;
      font-size: 15px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .autocomplete-list li:active {
      background: var(--surface);
    }
    .autocomplete-list li span.autocomplete-match {
      font-weight: 700;
      color: var(--orange);
    }
    .add-btn {
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .add-btn:active { transform: scale(0.94); }

    /* FREQUENCY PICKER (add bar) */
    .freq-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 20px 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .freq-row::-webkit-scrollbar { display: none; }
    .freq-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      flex-shrink: 0;
    }
    .freq-pill {
      font-size: 12px;
      font-weight: 600;
      padding: 15px 12px;
      border-radius: 99px;
      border: 2px solid #F0F0F0;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .freq-pill.selected {
      background: var(--orange);
      border-color: var(--orange);
      color: white;
    }

    /* PROGRESS BAR */
    .progress-wrap { padding: 0 20px 20px; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 8px;
      background: #F0F0F0;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--orange), var(--yellow));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* SECTION */
    .section { padding: 0 20px 8px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .section-icon { font-size: 18px; }
    .section-name {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    .section-count {
      font-size: 11px;
      background: #F0F0F0;
      color: var(--text-muted);
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 600;
    }

    /* ITEM CARD */
    .item-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      border: 2px solid #F0F0F0;
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, opacity 0.2s;
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .item-card:active { transform: scale(0.98); }
    .item-card.checked {
      background: #FAFAFA;
      border-color: #E8E8E8;
      opacity: 0.7;
    }
    .item-check {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2.5px solid #DDD;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .item-card.checked .item-check {
      background: var(--orange);
      border-color: var(--orange);
      color: white;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-size: 15px;
      font-weight: 600;
      transition: text-decoration 0.2s;
    }
    .item-card.checked .item-name {
      text-decoration: line-through;
      color: var(--text-muted);
    }
    .item-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .item-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 99px;
      flex-shrink: 0;
    }
    .badge-recurring { background: var(--orange-light); color: var(--orange); }
    #clear-checked-btn {
      font-size: 12px;
      font-weight: 700;
      color: var(--orange);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .badge-wife { background: var(--blue-light); color: var(--blue); }
    .badge-shared { background: var(--yellow-light); color: #B8940A; }
    .item-delete {
      background: none;
      border: none;
      color: #CCC;
      font-size: 16px;
      cursor: pointer;
      padding: 13px 4px;
      border-radius: 8px;
      flex-shrink: 0;
      transition: color 0.2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .item-delete:hover { color: #FF4444; }
    .item-skip {
      background: none;
      border: none;
      color: #CCC;
      font-size: 16px;
      cursor: pointer;
      padding: 13px 4px;
      border-radius: 8px;
      flex-shrink: 0;
      transition: color 0.2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .item-skip:hover { color: #F5820A; }

    /* ITEM CHECK WRAP (dedicated tap target for check circle) */
    .item-check-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      flex-shrink: 0;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* BOTTOM SHEET */
    #item-sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 400;
    }
    #item-sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--bg);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      max-height: 80vh;
      overflow-y: auto;
    }
    .sheet-handle {
      width: 40px;
      height: 4px;
      background: #E0E0E0;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--bg);
      display: flex;
      padding: 6px 0 calc(16px + env(safe-area-inset-bottom));
      z-index: 40;
    }
    #add-bar-dock {
      position: fixed;
      bottom: calc(60px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--bg);
      border-top: 1px solid #F0F0F0;
      padding: 8px 0 8px;
      z-index: 50;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      padding: 6px 4px;
      border-radius: 12px;
      transition: background 0.2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item:active { background: var(--surface); }
    .nav-icon { font-size: 22px; }
    .nav-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .nav-item.active .nav-label { color: var(--orange); }
    .nav-item.active .nav-icon { filter: none; }

    /* PAGE */
    .page { display: none; }
    .page.active { display: block; }

    /* SCHEDULE PAGE */
    .schedule-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      margin: 0 20px 12px;
    }
    .schedule-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .schedule-item-name { font-size: 15px; font-weight: 700; }
    .schedule-freq {
      font-size: 12px;
      color: var(--orange);
      font-weight: 600;
      background: var(--orange-light);
      padding: 3px 9px;
      border-radius: 99px;
    }
    .schedule-next { font-size: 12px; color: var(--text-muted); }
    .page-title { font-size: 22px; font-weight: 800; padding: 24px 20px 16px; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 48px 32px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1A1A1A;
      color: white;
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      z-index: 200;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* DIVIDER */
    .divider { height: 12px; }

    /* SCHEDULE ADD BUTTON */
    .schedule-add-btn {
      width: 100%;
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .schedule-add-btn:active { opacity: 0.85; }

    /* SELECT styled as modal-input */
    select.modal-input { appearance: none; -webkit-appearance: none; }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      padding: 24px;
    }
    .modal-box {
      background: var(--bg);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 360px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 20px;
    }
    .modal-field { margin-bottom: 16px; }
    .modal-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 6px;
    }
    .modal-input {
      width: 100%;
      border: 2px solid #F0F0F0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--orange); }
    .modal-input.error { border-color: #EF4444; }
    .modal-error {
      font-size: 12px;
      color: #EF4444;
      margin-top: 5px;
      min-height: 16px;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .modal-btn-cancel {
      flex: 1;
      background: var(--surface);
      color: var(--text-muted);
      border: 2px solid #F0F0F0;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .modal-btn-create {
      flex: 1;
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

<!-- PAGES -->
<div id="page-list" class="page active">
  <div class="header">
    <div class="header-top">
      <div class="header-title">My Groceries</div>
      <div class="store-btn-wrap">
        <button class="store-btn" id="store-btn" onclick="toggleStoreDropdown(event)">
          <span id="store-btn-label">🛒 Sobeys</span>
          <span class="store-chevron">▾</span>
        </button>
        <div class="store-dropdown" id="store-dropdown" style="display:none;"></div>
      </div>
    </div>
    <div class="header-subtitle" id="header-subtitle">Loading your list...</div>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-label">
      <span id="progress-text">0 of 0 items checked</span>
      <span id="progress-pct">0%</span>
      <button id="clear-checked-btn" onclick="clearCheckedItems()" style="display:none;">Clear checked</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div id="list-container"></div>
</div>

<div id="page-history" class="page">
  <div class="page-title">Item History</div>
  <div id="history-container"></div>
</div>

<!-- ADD BAR DOCK -->
<div id="add-bar-dock">
  <div class="freq-row">
    <span class="freq-label">Schedule:</span>
    <span class="freq-pill" data-days="1" onclick="selectFreq(this)">Daily</span>
    <span class="freq-pill" data-days="3" onclick="selectFreq(this)">Every 3 Days</span>
    <span class="freq-pill selected" data-days="7" onclick="selectFreq(this)">Weekly</span>
    <span class="freq-pill" data-days="14" onclick="selectFreq(this)">Biweekly</span>
    <span class="freq-pill" data-days="30" onclick="selectFreq(this)">Monthly</span>
    <span class="freq-pill" data-days="0" onclick="selectFreq(this)">As Needed</span>
  </div>
  <div class="add-bar">
    <div class="autocomplete-wrap">
      <input class="add-input" id="add-input" type="text" placeholder="Add an item…" autocomplete="off">
      <ul class="autocomplete-list" id="autocomplete-list"></ul>
    </div>
    <button class="add-btn" onclick="addItem()">+</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" id="nav-list" onclick="showPage('list')">
    <div class="nav-icon">🛒</div>
    <div class="nav-label">List</div>
  </div>
  <div class="nav-item" id="nav-history" onclick="showPage('history')">
    <div class="nav-icon">📋</div>
    <div class="nav-label">History</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ADD STORE MODAL -->
<div class="modal-overlay" id="store-modal" style="display:none;" onclick="handleModalOverlayClick(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">Add New Store</div>
    <div class="modal-field">
      <label class="modal-label">Store name</label>
      <input class="modal-input" id="modal-store-name" type="text" placeholder="e.g. Whole Foods" autocomplete="off" />
      <div class="modal-error" id="modal-name-error"></div>
    </div>
    <div class="modal-field">
      <label class="modal-label">Shopping day (optional)</label>
      <input class="modal-input" id="modal-shopping-day" type="text" placeholder="e.g. Sunday" autocomplete="off" />
    </div>
    <div class="modal-actions">
      <button class="modal-btn-cancel" onclick="closeStoreModal()">Cancel</button>
      <button class="modal-btn-create" onclick="createStore()">Create Store</button>
    </div>
  </div>
</div>

<!-- SKIP MODAL -->
<div class="modal-overlay" id="skip-modal" style="display:none;" onclick="handleSkipModalOverlayClick(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title" id="skip-modal-title">Skip</div>
    <div class="modal-field">
      <label class="modal-label">Skip to date</label>
      <input class="modal-input" id="skip-modal-date" type="date" />
      <div class="modal-error" id="skip-modal-error"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;margin-top:8px;">
      <button class="modal-btn-create" style="padding:14px;flex:none;width:100%;" onclick="confirmSkip()">Confirm Skip</button>
      <button style="background:none;border:none;color:var(--text-muted);padding:12px;font-size:14px;font-weight:600;cursor:pointer;width:100%;touch-action:manipulation;-webkit-tap-highlight-color:transparent;" onclick="closeSkipModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- ITEM BOTTOM SHEET -->
<div id="item-sheet-overlay" style="display:none;" onclick="closeItemSheet()">
  <div id="item-sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div id="sheet-item-name" style="font-size:20px;font-weight:800;margin-bottom:4px;"></div>
    <div id="sheet-item-cat" class="item-meta" style="margin-bottom:16px;"></div>
    <div style="height:1px;background:#F0F0F0;margin-bottom:16px;"></div>
    <div class="modal-label" style="margin-bottom:12px;">CATEGORY</div>
    <select id="sheet-category" class="modal-input" style="margin-bottom:10px;">
      <option value="Produce">🥦 Produce</option>
      <option value="Dairy &amp; Milk">🥛 Dairy &amp; Milk</option>
      <option value="Yogurt">🫙 Yogurt</option>
      <option value="Meat &amp; Seafood">🍗 Meat &amp; Seafood</option>
      <option value="Breakfast">🥣 Breakfast</option>
      <option value="Supplements">💪 Supplements</option>
      <option value="Snacks">🥜 Snacks</option>

    </select>
    <button onclick="saveItemCategory()" style="width:100%;background:var(--blue);color:white;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:8px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;">Save Category</button>
    <button onclick="addCustomCategory()" style="width:100%;background:none;border:none;color:var(--text-muted);font-size:13px;font-weight:600;padding:8px;cursor:pointer;margin-bottom:8px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;">＋ Add custom category</button>
    <div style="height:1px;background:#F0F0F0;margin-bottom:16px;"></div>
    <div class="modal-label" style="margin-bottom:12px;">SCHEDULE</div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;">
      <span style="font-size:14px;font-weight:600;flex-shrink:0;">Frequency</span>
      <select id="sheet-freq" class="modal-input" style="width:auto;flex:1;max-width:160px;" onchange="onSheetFreqChange()">
        <option value="1">Daily</option>
        <option value="3">Every 3 Days</option>
        <option value="7">Weekly</option>
        <option value="14">Biweekly</option>
        <option value="30">Monthly</option>
        <option value="0">As Needed</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;">
      <span style="font-size:14px;font-weight:600;flex-shrink:0;">Next appearance</span>
      <input type="date" id="sheet-next-date" class="modal-input" style="width:auto;flex:1;max-width:160px;" />
    </div>
    <button onclick="saveItemSchedule()" style="width:100%;background:var(--orange);color:white;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:16px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;">Save Schedule</button>
    <div style="height:1px;background:#F0F0F0;margin-bottom:12px;"></div>
    <button onclick="removeItemFromList()" style="width:100%;background:none;border:none;color:#FF4444;font-size:15px;font-weight:600;padding:12px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;">Remove from list</button>
  </div>
</div>

<script>
// ─── CONSTANTS ─────────────────────────────────────────────────────────────────

const CATEGORIES = {
  'Produce':        { icon: '🥦', color: '#22C55E', items: ['carrots','apples','bananas','avocados','blueberries','raspberries','strawberries','grapes','mango','pineapple','watermelon','peaches','pears','plums','cherries','kiwi','oranges','lemons','limes','grapefruit','spinach','kale','lettuce','arugula','broccoli','cauliflower','celery','cucumber','zucchini','peppers','tomatoes','onions','garlic','ginger','potatoes','sweet potatoes','mushrooms','corn','peas','green beans','asparagus','beets','radish','cabbage','brussels sprouts','herbs','cilantro','parsley','basil','mint'] },
  'Dairy & Milk':   { icon: '🥛', color: '#3B82F6', items: ['protein milk','regular milk','milk','oat milk','almond milk','soy milk','coconut milk','lactose free milk','skim milk','2% milk','whole milk','cream','half and half','butter','ghee','cream cheese','sour cream','cottage cheese','whipping cream','condensed milk','evaporated milk'] },
  'Yogurt':         { icon: '🫙', color: '#A78BFA', items: ['protein yogurt','coconut yogurt','yogurt','greek yogurt','skyr','kefir','probiotic yogurt','plain yogurt','vanilla yogurt','fruit yogurt'] },
  'Meat & Seafood': { icon: '🍗', color: '#EF4444', items: ['chicken thighs','shrimp','chicken','beef','salmon','ground beef','ground turkey','turkey','pork','lamb','bacon','sausage','steak','ribs','brisket','tuna','tilapia','cod','halibut','mahi','scallops','crab','lobster','clams','mussels','squid','sardines','anchovies','hot dogs','deli meat','pepperoni','prosciutto','ham','salami'] },
  'Breakfast':      { icon: '🥣', color: '#F59E0B', items: ['cereal','granola mini','granola','oats','oatmeal','overnight oats','eggs','egg whites','bagel','bread','toast','english muffin','pancake mix','waffle mix','syrup','jam','peanut butter','almond butter','nut butter','muffins','croissant','waffles','french toast'] },
  'Supplements':    { icon: '💪', color: '#F5820A', items: ['protein shakes','pre-workout','creatine','protein powder','whey protein','protein bar','protein bars','bcaa','amino acids','multivitamin','vitamins','vitamin c','vitamin d','omega 3','fish oil','magnesium','zinc','collagen','probiotics','electrolytes','greens powder','mass gainer'] },
  'Snacks':         { icon: '🥜', color: '#84CC16', items: ['pistachios','almonds','cashews','nuts','mixed nuts','peanuts','walnuts','pecans','macadamia','trail mix','chips','crackers','pretzels','popcorn','rice cakes','granola bar','protein bar','energy bar','chocolate','dark chocolate','candy','gummies','dried fruit','dates','jerky','hummus','guacamole','salsa','dip'] },
  'Other':          { icon: '🛍️', color: '#94A3B8', items: [] },
};

const WIFE_ITEMS   = ['raspberries','coconut yogurt','avocados'];
const SHARED_ITEMS = ['blueberries'];

const STARTER_ITEMS = [
  { name: 'Protein Milk',   freq: 7  },
  { name: 'Regular Milk',   freq: 7  },
  { name: 'Protein Yogurt', freq: 7  },
  { name: 'Coconut Yogurt', freq: 7  },
  { name: 'Carrots',        freq: 7  },
  { name: 'Apples',         freq: 7  },
  { name: 'Bananas',        freq: 7  },
  { name: 'Protein Shakes', freq: 7  },
  { name: 'Chicken Thighs', freq: 7  },
  { name: 'Blueberries',    freq: 7  },
  { name: 'Raspberries',    freq: 7  },
  { name: 'Shrimp',         freq: 14 },
  { name: 'Cereal',         freq: 14 },
  { name: 'Granola Mini',   freq: 14 },
  { name: 'Pre-Workout',    freq: 14 },
  { name: 'Creatine',       freq: 14 },
  { name: 'Avocados',       freq: 7  },
  { name: 'Pistachios',     freq: 14 },
];

const FREQ_PRESETS = [
  { label: 'Daily',        days: 1  },
  { label: 'Every 3 Days', days: 3  },
  { label: 'Weekly',       days: 7  },
  { label: 'Biweekly',     days: 14 },
  { label: 'Monthly',      days: 30 },
];

// ─── HELPERS ───────────────────────────────────────────────────────────────────

function categorize(name) {
  const lower = name.toLowerCase().trim();
  const app = loadAppData();
  const store = app.stores[app.activeStore];
  if (store.categoryOverrides && store.categoryOverrides[lower]) {
    return store.categoryOverrides[lower];
  }
  for (const [cat, data] of Object.entries(CATEGORIES)) {
    if (cat === 'Other') continue;
    if (data.items.some(k => lower.includes(k) || k.includes(lower))) return cat;
  }
  return 'Other';
}

function getOwnership(name) {
  const lower = name.toLowerCase().trim();
  if (WIFE_ITEMS.some(w => lower.includes(w) || w.includes(lower))) return 'wife';
  if (SHARED_ITEMS.some(s => lower.includes(s) || s.includes(lower))) return 'shared';
  return 'mine';
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function addDays(dateStr, days) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

function freqName(days) {
  if (days === 0) return 'As Needed';
  const preset = FREQ_PRESETS.find(p => p.days === days);
  return preset ? preset.label : `Every ${days} days`;
}

function emptyStore(shoppingDay) {
  return { shoppingDay: shoppingDay || null, items: [], history: [], schedules: [], lastSeedDate: null, categoryOverrides: {} };
}

// ─── APP DATA LAYER ────────────────────────────────────────────────────────────
// loadAppData / saveAppData handle the full structure.
// loadData / saveData work only on the active store's slice.

function loadAppData() {
  const raw = JSON.parse(localStorage.getItem('groceryApp') || 'null');

  // Migration: old flat format had a top-level items array
  if (raw && Array.isArray(raw.items)) {
    const migrated = {
      activeStore: 'Sobeys',
      stores: {
        'Sobeys': {
          shoppingDay: 'Saturday',
          items:        raw.items        || [],
          history:      raw.history      || [],
          schedules:    raw.schedules    || [],
          lastSeedDate: raw.lastSeedDate || null,
          categoryOverrides: {}
        }
      }
    };
    localStorage.setItem('groceryApp', JSON.stringify(migrated));
    return migrated;
  }

  return raw || {
    activeStore: 'Sobeys',
    stores: { 'Sobeys': emptyStore('Saturday') }
  };
}

function saveAppData(appData) {
  localStorage.setItem('groceryApp', JSON.stringify(appData));
}

function loadData() {
  const app = loadAppData();
  return app.stores[app.activeStore];
}

function saveData(storeData) {
  const app = loadAppData();
  app.stores[app.activeStore] = storeData;
  saveAppData(app);
}

// ─── SEED STARTER ITEMS (Sobeys only) ─────────────────────────────────────────

function seedStarterItems(storeData) {
  const app = loadAppData();
  if (app.activeStore !== 'Sobeys') return;
  if (storeData.lastSeedDate) return;
  const today = todayStr();
  STARTER_ITEMS.forEach(s => {
    const cat = categorize(s.name);
    storeData.history.push({ name: s.name, date: today, category: cat, seeded: true });
    storeData.schedules.push({ name: s.name, intervalDays: s.freq, nextDate: today, category: cat, seeded: true });
  });
  storeData.lastSeedDate = today;
  saveData(storeData);
}

// ─── SCHEDULING ────────────────────────────────────────────────────────────────

function checkSchedules(storeData) {
  const today = todayStr();
  const added = [];
  storeData.schedules.forEach(s => {
    if (s.nextDate <= today) {
      const alreadyOn = storeData.items.find(i => i.name.toLowerCase() === s.name.toLowerCase() && !i.checked);
      if (!alreadyOn) {
        storeData.items.push({
          id: Date.now() + Math.random(),
          name: s.name,
          category: categorize(s.name),
          checked: false,
          added: today,
          recurring: true,
          ownership: getOwnership(s.name)
        });
        added.push(s.name);
      }
      s.nextDate = addDays(today, s.intervalDays);
    }
  });
  return added;
}

// ─── FREQUENCY TRACKING ────────────────────────────────────────────────────────

function updateFrequency(storeData, name) {
  const lower = name.toLowerCase().trim();
  const entries = storeData.history.filter(h => h.name.toLowerCase() === lower && !h.seeded);
  if (entries.length < 2) return;
  const dates = entries.map(e => new Date(e.date)).sort((a, b) => a - b);
  let totalDays = 0;
  for (let i = 1; i < dates.length; i++) totalDays += (dates[i] - dates[i - 1]) / 86400000;
  const avgDays = Math.round(totalDays / (dates.length - 1));
  if (avgDays < 1) return;
  const existing = storeData.schedules.find(s => s.name.toLowerCase() === lower);
  if (existing) {
    existing.intervalDays = avgDays;
  } else {
    storeData.schedules.push({ name, intervalDays: avgDays, nextDate: addDays(todayStr(), avgDays), category: categorize(name), seeded: false });
  }
}

// ─── FREQUENCY SELECTOR (add bar) ─────────────────────────────────────────────

let selectedFreqDays = 7;

function selectFreq(el) {
  document.querySelectorAll('.freq-pill').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
  selectedFreqDays = parseInt(el.dataset.days);
}

// ─── ADD ITEM ──────────────────────────────────────────────────────────────────

function addItem() {
  const input = document.getElementById('add-input');
  const name = input.value.trim();
  if (!name) return;
  const storeData = loadData();
  const cat = categorize(name);
  const today = todayStr();
  storeData.items.push({ id: Date.now(), name, category: cat, checked: false, added: today, recurring: false, ownership: getOwnership(name) });
  storeData.history.push({ name, date: today, category: cat, seeded: false });
  if (selectedFreqDays > 0) {
    const existing = storeData.schedules.find(s => s.name.toLowerCase() === name.toLowerCase());
    if (existing) {
      existing.intervalDays = selectedFreqDays;
    } else {
      storeData.schedules.push({ name, intervalDays: selectedFreqDays, nextDate: addDays(today, selectedFreqDays), category: cat, seeded: false });
    }
  }
  if (selectedFreqDays !== 0) updateFrequency(storeData, name);
  saveData(storeData);
  input.value = '';
  closeAutocomplete();
  renderList();
  showToast(`"${name}" added · ${freqName(selectedFreqDays)}`);
}

function getAutocompleteSuggestions(query) {
  if (!query || query.length < 1) return [];
  const app = loadAppData();
  const store = app.stores[app.activeStore];
  const seen = new Set();
  const names = [];
  store.history.forEach(h => {
    if (!seen.has(h.name.toLowerCase())) {
      seen.add(h.name.toLowerCase());
      names.push(h.name);
    }
  });
  const lower = query.toLowerCase();
  return names
    .filter(n => n.toLowerCase().includes(lower))
    .slice(0, 6);
}

function renderAutocomplete(query) {
  const list = document.getElementById('autocomplete-list');
  const suggestions = getAutocompleteSuggestions(query);
  if (!suggestions.length || !query) {
    list.style.display = 'none';
    list.innerHTML = '';
    return;
  }
  const lower = query.toLowerCase();
  list.innerHTML = suggestions.map(name => {
    const idx = name.toLowerCase().indexOf(lower);
    const before = name.slice(0, idx);
    const match = name.slice(idx, idx + query.length);
    const after = name.slice(idx + query.length);
    return `<li onmousedown="selectAutocomplete('${name.replace(/'/g, "\\'")}')">${before}<span class="autocomplete-match">${match}</span>${after}</li>`;
  }).join('');
  list.style.display = 'block';
}

function selectAutocomplete(name) {
  const input = document.getElementById('add-input');
  input.value = name;
  document.getElementById('autocomplete-list').style.display = 'none';
  input.focus();
}

function closeAutocomplete() {
  document.getElementById('autocomplete-list').style.display = 'none';
}

document.getElementById('add-input').addEventListener('input', function() {
  renderAutocomplete(this.value.trim());
});

document.getElementById('add-input').addEventListener('blur', function() {
  setTimeout(closeAutocomplete, 150);
});

document.getElementById('add-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItem();
  if (e.key === 'Escape') closeAutocomplete();
});

// ─── TOGGLE CHECK ──────────────────────────────────────────────────────────────

function toggleCheck(id) {
  const storeData = loadData();
  const item = storeData.items.find(i => i.id === id);
  if (item) item.checked = !item.checked;
  saveData(storeData);
  renderList();
}

// ─── DELETE ITEM ───────────────────────────────────────────────────────────────

function deleteItem(id, e) {
  e.stopPropagation();
  const storeData = loadData();
  storeData.items = storeData.items.filter(i => i.id !== id);
  saveData(storeData);
  renderList();
}

// ─── RENDER LIST ───────────────────────────────────────────────────────────────

function renderList() {
  const storeData = loadData();
  const container = document.getElementById('list-container');
  const total = storeData.items.length;
  const checked = storeData.items.filter(i => i.checked).length;
  const pct = total ? Math.round((checked / total) * 100) : 0;
  document.getElementById('progress-text').textContent = `${checked} of ${total} items checked`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('clear-checked-btn').style.display = checked > 0 ? 'block' : 'none';
  document.getElementById('progress-fill').style.width = `${pct}%`;
  if (pct === 100 && total > 0) {
    setTimeout(() => showToast('🎉 All done — great shop!'), 300);
  }
  document.getElementById('header-subtitle').textContent =
    total ? `${total - checked} item${total - checked !== 1 ? 's' : ''} remaining` : 'Your list is empty — add an item above';

  if (!total) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-text">Add your first item above</div></div>`;
    return;
  }

  const groups = {};
  storeData.items.forEach(item => {
    if (!groups[item.category]) groups[item.category] = [];
    groups[item.category].push(item);
  });

  let html = '';
  const catOrder = Object.keys(CATEGORIES);
  const sorted = Object.keys(groups).sort((a, b) => {
    const ai = catOrder.indexOf(a), bi = catOrder.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });

  sorted.forEach(cat => {
    const catData = CATEGORIES[cat] || { icon: '🛍️' };
    const items = groups[cat];
    const unchecked = items.filter(i => !i.checked);
    const ordered = [...unchecked, ...items.filter(i => i.checked)];

    html += `<div class="section"><div class="section-header">
      <span class="section-icon">${catData.icon}</span>
      <span class="section-name">${cat}</span>
      <span class="section-count">${unchecked.length}/${items.length}</span>
    </div>`;

    ordered.forEach(item => {
      let badge = '';
      if (item.ownership === 'wife') badge = `<span class="item-badge badge-wife">Wife</span>`;
      else if (item.ownership === 'shared') badge = `<span class="item-badge badge-shared">Shared</span>`;
      else if (item.recurring) {
        const sched = storeData.schedules.find(s => s.name.toLowerCase() === item.name.toLowerCase());
        const interval = sched ? sched.intervalDays : 7;
        badge = '<span class="item-badge badge-recurring">↻ ' + freqName(interval) + '</span>';
      }
      const skipBtn = item.recurring ? `<button class="item-skip" onclick="skipItem('${item.name.replace(/'/g,"\\'")}', event)">⏭</button>` : '';
      html += `<div class="item-card ${item.checked ? 'checked' : ''}" onclick="openItemSheet(${item.id})">
        <div class="item-check-wrap" onclick="event.stopPropagation(); toggleCheck(${item.id})">
          <div class="item-check">${item.checked ? '✓' : ''}</div>
        </div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-meta">${item.category}</div>
        </div>
        ${badge}
        ${skipBtn}
        <button class="item-delete" onclick="deleteItem(${item.id}, event)">✕</button>
      </div>`;
    });

    html += `</div><div class="divider"></div>`;
  });

  container.innerHTML = html;
}

// ─── RENDER HISTORY ────────────────────────────────────────────────────────────

function renderHistory() {
  const storeData = loadData();
  const container = document.getElementById('history-container');
  const freq = {};
  storeData.history.filter(h => !h.seeded).forEach(h => {
    if (!freq[h.name]) freq[h.name] = { count: 0, category: h.category, lastDate: h.date };
    freq[h.name].count++;
    if (h.date > freq[h.name].lastDate) freq[h.name].lastDate = h.date;
  });
  const entries = Object.entries(freq).sort((a, b) => b[1].count - a[1].count);
  if (!entries.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No history yet — add items to your list</div></div>`;
    return;
  }
  let html = '';
  entries.forEach(([name, info]) => {
    const cat = CATEGORIES[info.category] || { icon: '🛍️' };
    html += `<div class="schedule-card">
      <div class="schedule-card-header">
        <div class="schedule-item-name">${cat.icon} ${name}</div>
        <span class="schedule-freq">${info.count}× added</span>
      </div>
      <div class="schedule-next">Last added: ${info.lastDate} · Category: ${info.category}</div>
    </div>`;
  });
  container.innerHTML = html;
}

// ─── ITEM BOTTOM SHEET ─────────────────────────────────────────────────────────

let sheetItemId = null;

function openItemSheet(id) {
  const storeData = loadData();
  const item = storeData.items.find(i => i.id === id);
  if (!item) return;
  sheetItemId = id;

  const cat = CATEGORIES[item.category] || { icon: '🛍️' };
  document.getElementById('sheet-item-name').textContent = item.name;
  document.getElementById('sheet-item-cat').textContent = cat.icon + ' ' + item.category;
  document.getElementById('sheet-category').value = item.category;

  const schedule = storeData.schedules.find(s => s.name.toLowerCase() === item.name.toLowerCase());
  const validDays = ['1','3','7','14','30','0'];
  const freqSel = document.getElementById('sheet-freq');
  freqSel.value = (schedule && validDays.includes(String(schedule.intervalDays))) ? String(schedule.intervalDays) : '0';

  const dateInput = document.getElementById('sheet-next-date');
  if (schedule && schedule.nextDate) {
    dateInput.value = schedule.nextDate;
  } else {
    const days = parseInt(freqSel.value);
    dateInput.value = addDays(todayStr(), days > 0 ? days : 0);
  }

  document.getElementById('item-sheet-overlay').style.display = 'block';
}

function closeItemSheet() {
  document.getElementById('item-sheet-overlay').style.display = 'none';
  sheetItemId = null;
}

function saveItemCategory() {
  if (sheetItemId === null) return;
  const selectedCategory = document.getElementById('sheet-category').value;
  const app = loadAppData();
  const store = app.stores[app.activeStore];
  const item = store.items.find(i => i.id === sheetItemId);
  if (!item) return;
  if (selectedCategory === item.category) {
    closeItemSheet();
    return;
  }
  item.category = selectedCategory;
  if (!store.categoryOverrides) store.categoryOverrides = {};
  store.categoryOverrides[item.name.toLowerCase()] = selectedCategory;
  saveAppData(app);
  renderList();
  closeItemSheet();
  showToast(`${item.name} moved to ${selectedCategory}`);
}

function addCustomCategory() {
  const newName = prompt('New category name:');
  if (!newName || !newName.trim()) return;
  const trimmed = newName.trim();
  if (CATEGORIES[trimmed]) {
    showToast('Category already exists');
    return;
  }
  CATEGORIES[trimmed] = { icon: '🛍️', color: '#94A3B8', items: [] };
  const select = document.getElementById('sheet-category');
  const opt = document.createElement('option');
  opt.value = trimmed;
  opt.textContent = '🛍️ ' + trimmed;
  select.appendChild(opt);
  select.value = trimmed;
}

function onSheetFreqChange() {
  const days = parseInt(document.getElementById('sheet-freq').value);
  document.getElementById('sheet-next-date').value = addDays(todayStr(), days > 0 ? days : 0);
}

function saveItemSchedule() {
  if (sheetItemId === null) return;
  const storeData = loadData();
  const item = storeData.items.find(i => i.id === sheetItemId);
  if (!item) return;
  const days = parseInt(document.getElementById('sheet-freq').value);
  const nextDate = document.getElementById('sheet-next-date').value;
  if (days === 0) {
    storeData.schedules = storeData.schedules.filter(s => s.name.toLowerCase() !== item.name.toLowerCase());
    saveData(storeData);
    showToast(`${item.name} removed from schedule`);
  } else {
    const existing = storeData.schedules.find(s => s.name.toLowerCase() === item.name.toLowerCase());
    if (existing) {
      existing.intervalDays = days;
      existing.nextDate = nextDate;
    } else {
      storeData.schedules.push({ name: item.name, intervalDays: days, nextDate, category: categorize(item.name), seeded: false });
    }
    saveData(storeData);
    showToast(`${item.name} schedule saved`);
  }
  closeItemSheet();
}

function removeItemFromList() {
  if (sheetItemId === null) return;
  const storeData = loadData();
  const item = storeData.items.find(i => i.id === sheetItemId);
  if (!item) return;
  const name = item.name;
  storeData.items = storeData.items.filter(i => i.id !== sheetItemId);
  saveData(storeData);
  closeItemSheet();
  renderList();
  showToast(`${name} removed from list`);
}

// ─── CLEAR CHECKED ITEMS ───────────────────────────────────────────────────────

function clearCheckedItems() {
  const storeData = loadData();
  const removed = storeData.items.filter(i => i.checked).length;
  storeData.items = storeData.items.filter(i => !i.checked);
  saveData(storeData);
  renderList();
  showToast(removed + ' checked item' + (removed !== 1 ? 's' : '') + ' cleared');
}

// ─── SKIP ITEM ─────────────────────────────────────────────────────────────────

let _skipItemName = null;

function skipItem(name, e) {
  e.stopPropagation();
  const storeData = loadData();
  const schedule = storeData.schedules.find(s => s.name.toLowerCase() === name.toLowerCase());
  if (!schedule) {
    showToast('No schedule found for ' + name);
    return;
  }
  _skipItemName = name;
  const suggested = addDays(schedule.nextDate, schedule.intervalDays);
  document.getElementById('skip-modal-title').textContent = 'Skip ' + name;
  document.getElementById('skip-modal-date').value = suggested;
  document.getElementById('skip-modal-error').textContent = '';
  document.getElementById('skip-modal').style.display = 'flex';
}

function closeSkipModal() {
  document.getElementById('skip-modal').style.display = 'none';
  _skipItemName = null;
}

function handleSkipModalOverlayClick(e) {
  if (e.target === document.getElementById('skip-modal')) closeSkipModal();
}

function confirmSkip() {
  const dateVal = document.getElementById('skip-modal-date').value;
  if (!dateVal) {
    document.getElementById('skip-modal-error').textContent = 'Please pick a date.';
    return;
  }
  const storeData = loadData();
  const schedule = storeData.schedules.find(s => s.name.toLowerCase() === _skipItemName.toLowerCase());
  if (!schedule) {
    closeSkipModal();
    showToast('No schedule found for ' + _skipItemName);
    return;
  }
  schedule.nextDate = dateVal;
  saveData(storeData);
  closeSkipModal();
  renderList();
  const d = new Date(dateVal + 'T00:00:00');
  const weekday = d.toLocaleDateString('en-US', { weekday: 'short' });
  const month = d.toLocaleDateString('en-US', { month: 'short' });
  const day = d.getDate();
  showToast(`${_skipItemName || 'Item'} skipped — next up ${weekday} ${month} ${day}`);
}

// ─── DELETE SCHEDULED ITEM ─────────────────────────────────────────────────────

function deleteScheduledItem(name) {
  const storeData = loadData();
  storeData.schedules = storeData.schedules.filter(s => s.name.toLowerCase() !== name.toLowerCase());
  saveData(storeData);
}

// ─── STORE SWITCHER ────────────────────────────────────────────────────────────

function updateStoreHeader() {
  const app = loadAppData();
  const store = app.stores[app.activeStore];
  const day = store.shoppingDay;
  let label = '🛒 ' + app.activeStore;
  if (day) {
    // Abbreviate day to 3 letters
    const shortDay = day.length > 3 ? day.slice(0, 3) : day;
    const today = new Date().toLocaleDateString('en-US', { weekday: 'long' });
    label += today === day ? ` · Today!` : ` · ${shortDay}`;
  }
  document.getElementById('store-btn-label').textContent = label;
}

function renderStoreDropdown() {
  const app = loadAppData();
  const dropdown = document.getElementById('store-dropdown');
  let html = '';
  Object.keys(app.stores).forEach(name => {
    const store = app.stores[name];
    const isActive = name === app.activeStore;
    const itemCount = store.items ? store.items.length : 0;
    const countLabel = `<span class="store-item-count">${itemCount} item${itemCount !== 1 ? 's' : ''}</span>`;
    html += `<div class="store-dropdown-item ${isActive ? 'active' : ''}" onclick="switchStore('${name.replace(/'/g,"\\'")}')">
      ${isActive ? '✓ ' : ''}${name} ${countLabel}
    </div>`;
  });
  html += `<div class="store-dropdown-divider"></div>`;
  html += `<div class="store-dropdown-add" onclick="openAddStoreModal()">＋ Add new store</div>`;
  dropdown.innerHTML = html;
}

function toggleStoreDropdown(e) {
  e.stopPropagation();
  const dropdown = document.getElementById('store-dropdown');
  const isOpen = dropdown.style.display !== 'none';
  if (isOpen) {
    dropdown.style.display = 'none';
  } else {
    renderStoreDropdown();
    dropdown.style.display = 'block';
  }
}

function closeDropdown() {
  document.getElementById('store-dropdown').style.display = 'none';
}

document.addEventListener('click', function(e) {
  const wrap = document.querySelector('.store-btn-wrap');
  if (wrap && !wrap.contains(e.target)) closeDropdown();
});

function switchStore(name) {
  const app = loadAppData();
  app.activeStore = name;
  saveAppData(app);
  closeDropdown();
  updateStoreHeader();
  renderList();
}

// ─── ADD STORE MODAL ───────────────────────────────────────────────────────────

function openAddStoreModal() {
  closeDropdown();
  document.getElementById('modal-store-name').value = '';
  document.getElementById('modal-shopping-day').value = '';
  document.getElementById('modal-name-error').textContent = '';
  document.getElementById('modal-store-name').classList.remove('error');
  document.getElementById('store-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('modal-store-name').focus(), 100);
}

function closeStoreModal() {
  document.getElementById('store-modal').style.display = 'none';
}

function handleModalOverlayClick(e) {
  if (e.target === document.getElementById('store-modal')) closeStoreModal();
}

function createStore() {
  const nameInput = document.getElementById('modal-store-name');
  const dayInput = document.getElementById('modal-shopping-day');
  const errorEl = document.getElementById('modal-name-error');
  const name = nameInput.value.trim();
  const day = dayInput.value.trim() || null;

  // Validation
  errorEl.textContent = '';
  nameInput.classList.remove('error');
  if (!name) {
    errorEl.textContent = 'Store name is required';
    nameInput.classList.add('error');
    nameInput.focus();
    return;
  }
  const app = loadAppData();
  const duplicate = Object.keys(app.stores).some(k => k.toLowerCase() === name.toLowerCase());
  if (duplicate) {
    errorEl.textContent = 'A store with this name already exists';
    nameInput.classList.add('error');
    nameInput.focus();
    return;
  }

  // Create store with empty data
  app.stores[name] = emptyStore(day);
  app.activeStore = name;
  saveAppData(app);
  closeStoreModal();
  updateStoreHeader();
  renderList();
  showToast(`"${name}" created`);
}

// ─── NAVIGATION ────────────────────────────────────────────────────────────────

function showPage(page) {
  ['list','history'].forEach(p => {
    document.getElementById(`page-${p}`).classList.toggle('active', p === page);
    document.getElementById(`nav-${p}`).classList.toggle('active', p === page);
  });
  if (page === 'history') renderHistory();
}

// ─── TOAST ─────────────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── INIT ──────────────────────────────────────────────────────────────────────

(function init() {
  const storeData = loadData();
  seedStarterItems(storeData);
  const added = checkSchedules(storeData);
  saveData(storeData);
  renderList();
  updateStoreHeader();
  if (added.length) {
    setTimeout(() => showToast(`↻ Auto-added ${added.length} recurring item${added.length > 1 ? 's' : ''}`), 600);
  }
})();
</script>
</body>
